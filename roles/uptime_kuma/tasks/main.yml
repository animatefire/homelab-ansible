---
- name: Install curl
  apt:
    name: curl
    state: present
    update_cache: yes

- name: Install NVM
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
  args:
    creates: /root/.nvm/nvm.sh

- name: Install Node.js via NVM
  shell: |
    export NVM_DIR="/root/.nvm"
    source /root/.nvm/nvm.sh
    nvm install 18
    nvm use 18
  args:
    executable: /bin/bash

- name: Install git
  apt:
    name: git
    state: present
    update_cache: yes

- name: Clone Uptime Kuma
  git:
    repo: https://github.com/louislam/uptime-kuma.git
    dest: /opt/uptime-kuma
    version: master

- name: Install Uptime Kuma dependencies
  shell: |
    export NVM_DIR="/root/.nvm"
    source /root/.nvm/nvm.sh
    cd /opt/uptime-kuma && npm install --production
  args:
    executable: /bin/bash

- name: Create systemd service
  copy:
    dest: /etc/systemd/system/uptime-kuma.service
    content: |
      [Unit]
      Description=Uptime Kuma
      After=network.target

      [Service]
      Type=simple
      WorkingDirectory=/opt/uptime-kuma
      ExecStart=/root/.nvm/versions/node/v18/bin/node server/server.js
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Enable and start Uptime Kuma
  systemd:
    name: uptime-kuma
    enabled: yes
    state: started
    daemon_reload: yes
